server {
    listen 80;
    server_name localhost;
    include /etc/nginx/mime.types;

    # Keep your CSP header exactly as it is (it's working!)
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://login-demo-egdqghdecgbhdeht.westeurope-01.azurewebsites.net;" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # FIX: Use a variable for the proxy_pass. 
    # This prevents Nginx from crashing if 'backend' isn't found at startup.
    location /api/ {
        resolver 127.0.0.11 valid=30s; # Docker's internal DNS
        set $upstream_backend http://backend:8080;
        proxy_pass $upstream_backend/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}