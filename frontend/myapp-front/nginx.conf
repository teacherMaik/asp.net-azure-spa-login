server {
    listen 80;
    server_name localhost;
    include /etc/nginx/mime.types;

    # Notice connect-src is set to 'self'
    # This works because Nginx will act as the middleman (Reverse Proxy)
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src-attr 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # This routes any frontend call starting with /api to your backend container
    location /api/ {
        proxy_pass http://backend:8080/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}